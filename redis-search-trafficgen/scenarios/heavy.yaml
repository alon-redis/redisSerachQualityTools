name: heavy
seed: 42

redis:
  addrs: ["127.0.0.1:6379"]
  protocol: 2
  # 100 worker connections + a small idle headroom.
  pool_size: 110
  # Preload a 250k-product corpus with 384/512/8-D vectors; the initial
  # JSON.SET / HSET burst can stall longer than the default 3s read timeout.
  read_timeout: 30s
  write_timeout: 30s
  dial_timeout: 5s
  flex_mode: auto

dataset:
  # 250k product keys is the real target. Events live in a separate index
  # under their own prefix; 50k is enough to keep the event index healthy
  # without bloating preload time. Total Redis keys ~ 300k.
  products: 250000
  events:   50000
  preload:  true
  drop_indexes: true
  flush_db: false

indexes:
  product:
    name: idx:product
    prefix: "product:"
  event:
    name: idx:event
    prefix: "event:"

vectors:
  desc_dim:   384
  img_dim:    512
  feat_dim:   8
  clusters:   50

phases:
  - name: warmup
    duration: 60s
    target_qps: 0          # closed loop — let connections fill, indexes warm
    concurrency: 100
    op_timeout: 30s

  - name: steady_5h
    duration: 18000s       # 5 hours
    target_qps: 0          # closed loop — sustain 100 in-flight ops
    concurrency: 100
    op_timeout: 30s

mix:
  ft_search_text:     30
  ft_search_prefix:   10
  ft_search_knn:      25
  ft_hybrid_rrf:      20
  ft_aggregate_facet: 15

assertions:
  # Sample very sparsely over 5 hours — at p50 ~75ms each side query
  # roughly halves the effective throughput on the sampled op. 0.0005 fires
  # roughly every 2000 ops, ~10 samples / minute for the heaviest ops.
  bm25_descending:
    enabled: false
    sample_rate: 0.0
    severity: warn
  prefix_membership:
    enabled: true
    sample_rate: 0.0005
    severity: warn
  knn_recall_at_10:
    enabled: true
    sample_rate: 0.0002
    min_recall: 0.0
    severity: warn
  hybrid_top1_in_either_leg:
    enabled: true
    sample_rate: 0.0005
    severity: warn

coverage:
  min_features_exercised: 0

metrics:
  out_dir: "./out"
  histogram_significant_digits: 3
  # 5 minutes max value — give the histogram headroom for tail spikes
  # without quantising real latencies.
  histogram_max_value_ms: 300000

logging:
  level: info
  format: console
